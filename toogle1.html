<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu</title>
</head>

<style>

body{
    padding: 0;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #fbffca;
}


header
{
font-size:30px;
text-transform:uppercase;
font-family:Arial black;
background:teal;
color:white;
text-align:center;
box-sizing:border-box;
padding:20px;
box-shadow:5px 5px 5px rgb(136, 207, 162);
width:40%;
margin:auto;
margin-bottom:50px;
margin-top:20px;

}

#nav
    {
        display: flex;
        justify-content: space-evenly;
        margin-top: 40px;
    }


      #m,#m2,#m3 {
        width:120px;
        margin-top: 7px;
        background: rgb(0, 0, 0);
        color:rgb(245, 58, 58);
        padding: 0px;
    
        border-radius: 5px;


    }
   button{
        padding: 2px 20px;
        margin: 3px;
        font-size: 22px;
        color: rgb(0, 0, 0);
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.50s;
        border:2px solid black;
        
    }
         button:hover{
        transform: scale(1.0);
        background: rgb(255, 193, 193);
    }

  
    li{
        list-style-type: none;
        padding: 15px;
        cursor:pointer;
                     color: #fbffca;

    
    }
    li a{
        color: #fbffca;
        text-decoration: none;
    }
    li:hover{
        background: rgb(232, 94, 200);
    
    }

    .toggle
    {
        display: none;
    }
   
/* Footer */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top: 50px;
}



/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
    }

    #nav{
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    button{
        width:180px;
        font-size: 18px;
        padding: 12px;
    }

    #m, #m2, #m3{
        width:180px;
    }

   



</style>

<body>
    
<header>Interactive Dropdown Menu</header>

<div id="nav">

<div>
    <button onclick="show_hide_menu(event)" id="menu1">
        Main
    </button>

<ol id="m" class="toggle">
    <li><a href="index.html">Profile</a></li>
    <li><a href="practice.html">Practice</a></li>
    <li><a href="aotm2.html">Project</a></li>
</ol>
</div>

<div>
    <button onclick="show_hide_menu(event)" id="menu2">
       Project
    </button>

<ol id="m2" class="toggle">
     <li><a href="https://www.behance.net/sneharana15">Behance</a></li>
    <li><a href="practice.html">Practice</a></li>
    <li><a href="aotm2.html">Project</a></li>
</ol>
</div>

<div>
    <button onclick="show_hide_menu(event)" id="menu3">
        Social Media
    </button>

<ol id="m3" class="toggle">
    <li><a href="https://www.youtube.com">YouTube</a></li>
    <li><a href="https://www.instagram.com">Instagram</a></li>
    <li><a href="https://www.facebook.com">Facebook</a></li>
</ol>
</div>
</div>

<script>
    var menu_visible = false;
    var m1 = document.getElementById("m");

    function show_hide_menu(event)
    {
        //alert(event.target.id)
        var mid= event.target.id
        m1.classList.add("toggle");
        m2.classList.add("toggle");
        m3.classList.add("toggle");

        switch(mid)
        {
            case "menu1":
            m1.classList.remove("toggle");
            document.title = "Menu1"
            break;

            case"menu2":
            m2.classList.remove("toggle");
            document.title="Menu2"
            break;

            case "menu3":
            m3.classList.remove("toggle");
            document.title="Menu3"
            break;
        }
     }

     window.onclick = function(event)
     {
        //alert(event.target)
        if((event.target == "[object HTMLHtmlElement]")||(event.target == "[object HTMLUnknownElement]"))
     {
        m1.classList.add("toggle");
        m2.classList.add("toggle");
        m3.classList.add("toggle");
     }
     }

</script>



<!-- Footer -->

        <footer>
        <div id="footer"> ©2026 My Work | All Rights Reserved</div>

    </footer>
</html>
</footer>

</body>
</html>
