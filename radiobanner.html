        <script>
            var p = document.getElementById("p");
             var s = document.getElementsByName("slide");
             var c = 0;

             s[c].checked = true;

             var t ;

             function show()
             {
                if(c<=s.length-1)
             {
                c++
             }
             else
             {
                c=1;

             }
             p.src="images3/u"+c+".jpg";
             s[c-1].checked = true;

            document.title = c
            t = setTimeout(show,7000);

            s[0].onclick = function(){
                clearTimeout(t);
                  p.src = "images3/u1.jpg";
                c=1
               t = setTimeout(show,7000);

            }
          

            s[1].onclick = function(){
                clearTimeout(t);
                 p.src = "images3/u2.jpg";
                c=2
                 t = setTimeout(show,7000);

            }

            
            s[2].onclick = function(){
                clearTimeout(t);
                  p.src = "images3/u3.jpg";
                c=3
                t = setTimeout(show,7000);

            }
            
            s[3].onclick = function(){
                clearTimeout(t);
                 p.src = "images3/u4.jpg";
                c=4
                 t= setTimeout(show,7000);

            }

        }

        </script>
