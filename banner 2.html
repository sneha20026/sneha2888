<!DOCTYPE html>

<style>
@keyframes runbanner
{
10%{left:0%;}


20%{left:-19%;}
30%{left:-19%;}

40%{left:-38%;}
50%{left:-38%;}

60%{left:-57%;}
70%{left:-57%;}

80%{left:-76%;}
90%{left:-76%;}


}    

body
{
   overflow:hidden;     
}
header
{
//background:rgb(214, 45, 45);
width:550%;
height:600px;
overflow:hidden;    
}


    
.pic
{
    width:19%;
    height:100%;
    position:absolute;
    left:0%;
    animation:runbanner 15s linear infinite alternate;


}    

</style>


<body>

</header>
