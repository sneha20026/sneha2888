<style>

header
{

/* Gallery Container */
#gallery{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
    margin-left: 40px;
}

/* Images */
.pic{
    width:30%;
    height:260px;
    background: rgb(202, 251, 255);
    padding:10px;
    border-radius:10px;
    object-fit:cover;
    cursor:pointer;
}

/* Hover Effect */
.pic:hover{
    transform:scale(0.70s);
}

<header>

</header>

<!-- Gallery Container -->
<div id="gallery"></div>


    <script>
function preload()
{


    document.title="No Error"
    for(var i = 1;i<=8;i++)
{


var u = new Image()
document.body.appendChild(u)
u.className="pic"
u.src="images3/u"+i+".jpg"
   document.getElementById("gallery").appendChild(u)

        
        u.onmouseover = function()
        {
            this.style.transform = "scale(1.03)"
        }

        {

        }

}
