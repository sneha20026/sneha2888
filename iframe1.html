<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    margin-top: 0px;
    width: 220px;
    background: #871f1f;
    color: white;
    padding-top: 20px;
    border-radius:10px;
    margin-bottom:240px;
  }

  .sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  .sidebar a {
    display: block;
    color: white;
    padding: 12px 20px;
    text-decoration: none;
    transition: 0.3s;
  }

  .sidebar a:hover {
    background: #1fb85c;
    padding-left: 30px;
  }

  /* Main content */
  .main {
    flex: 1;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  
  }
