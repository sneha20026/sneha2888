Interactive Calculator

    <h3>
    No 1 <input type="number" id="t1" value="0"><br>
    No 2 <input type="number" id="t2" value="0"><br><br>
    Result<input type="number" id="r" value="0"><br><br>

    <button onclick="f1()">+</button>
    <button onclick="f2()">-</button>
    <button onclick="f3()">*</button>
    <button onclick="f4()">/</button>

    <script>
       var n1 = document.getElementById("t1") 
       var n2 = document.getElementById("t2") 
       var n = document.getElementById("r") 

        function f1()
        {
            
            var calculate = parseInt(n1.value)+parseInt(n2.value)
            r.value=calculate
        }

        function f2()
        {
    
            var calculate = parseInt(n1.value)-parseInt(n2.value)
            r.value=calculate
        }

        function f3()
        {
            
            var calculate = parseInt(n1.value)*parseInt(n2.value)
            r.value=calculate
        }

        function f4()
        {
            
            var calculate = parseInt(n1.value)/parseInt(n2.value)
            r.value=calculate
        }
</script>
