<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple Education Navbar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}



.navbar{
    background:#1e3a8a;
    padding:18px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    width: 20%;
    font-weight:bold;
    height:50px;
}

.nav-links{
    display:flex;
    list-style:none;
}

.nav-links li{
    margin-left:25px;
}

.nav-links li a{
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.nav-links li a:hover{
    color:#ff1d52;
}

</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">
      <img src="images3/u03.png">
    </div>

    <ul class="nav-links">

        <li><a href="#">Home</a></li>

        <li><a href="#">Courses</a></li>

        <li><a href="#">About</a></li>

        <li><a href="#">Contact</a></li>

    </ul>

</nav>

</body>
</html>
