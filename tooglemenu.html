<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #nav
    {
        display:flex;
        justify-content: space-evenly;

    }

    #m,#m2,#m3 {
        width:80px;
        margin-top: 2px;
        background: rgb(159,210, 19);
        color:rgb(20,20,20);
        padding: 0px;


    }
    li{
        list-style-type: none;
        padding: 10px;
        cursor:pointer;
    }
    li:hover{
        background: rgb(20,20,20);
        color:rgb(159,210, 19);
    }

    .toggle
    {
        display: none;
    }
    button{
        padding: 2px 20px;
        margin: 3px;
        font-size: 22px;
        color: rgb(0, 0, 0);
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.50s;
        border:2px solid black;
        
    }
         button:hover{
        transform: scale(1.0);
        background: rgb(255, 193, 193);
    }
header
{
font-size:30px;
text-transform:uppercase;
font-family:Arial black;
background:teal;
color:white;
text-align:center;
box-sizing:border-box;
padding:20px;
box-shadow:5px 5px 5px rgb(136, 207, 162);
width:40%;
margin:auto;
margin-bottom:50px;

}

body{
    padding: 0;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #fbffca;
}

</style>
<header>
DROP DOWN MENU IN JS
</header>
<body>

        
    <div< id="nav">


        <div>
    <button onclick="show_hide_menu(event)" id="menu1">
        Main
    </button>
        <ol id ="m" class="toggle">
            <li>Main</li>
            <li>Project<li>
            <li>Practice</li>
        </ol>
</div>



        <div>
    <button onclick="show_hide_menu(event)" id="menu2">
        Project
    </button>
        <ol id = "m2" class="toggle">
            <li>HTML</li>
            <li>JavaScript<li>
            <li>Bootstrape</li>
        </ol>
</div>

<div>

    <button onclick="show_hide_menu(event)" id="menu3">
        Social Media
    </button>
        <ol id = "m3" class="toggle">
            <li>Youtube</li>
            <li>Instagram<li>
            <li>Facebook</li>
        </ol>
</div>
</id>
</div>

<script>
    var menu_visible = false;
    var m1 = document.getElementById("m");


    function show_hide_menu(event)
    {

     //alert(event.target.id)
        var mid = event.target.id
        m1.classList.add("toggle");
         m2.classList.add("toggle");
          m3.classList.add("toggle");

          switch(mid)
          {
            case"menu1":
            m1.classlist.remove("toogle");
            document.title = "Menu1"
            break;

             case"menu2":
            m2.classlist.remove("toogle");
            document.title = "Menu2"
            break;

             case"menu3":
            m3.classlist.remove("toogle");
            document.title = "Menu3"
            break;

          }
    }

    window.onclick = function(event)
    {
             //alert(event.target)
        if((event.target == "[object HTMLHTmlElement]")||(event.target == "[object HTMLUnknownElement]"))
    {
        m1.classList.add("toogle");
        m2.classList.add("toggle");
        m3.classList.add("toogle");
    }
    }

</script>
    

    
</body>
</html>
