<body>
    <header>
        TABLE CREATION IN LOOP
    </header>
    
    <table border="1" cellpadding="10">
        <script>
            var row = prompt("Enter Row number to Create Table..","5")
            var col = prompt("Enter Coloumn number to Create Table..","5")

                     var c = 1 


           while(c<=row)
           {
            document.write("<tr>")
                for(var i = 1;i<=col;i++)
            {
                document.write("<td><input type='text'></td>")

            }


            document.write("</tr>")


            c++




        }
                 
        </script>
    </table>
