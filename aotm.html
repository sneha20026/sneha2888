<!DOCTYPE html>
<html lang="en">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple Education Navbar</title>
</head>

<style>

.banner{
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
}

.banner video{
    width:100%;
    height:100%;
    object-fit:cover;
    padding-top: 50px;
    padding-bottom: 50px;
}

.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    text-align:center;
    font-size:40px;
    font-family:Arial;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}



.navbar{
    background:#1e3a8a;
    padding:18px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    width: 20%;
    font-weight:bold;
    height:50px;
}

.nav-links{
    display:flex;
    list-style:none;
}

.nav-links li{
    margin-left:25px;
}

.nav-links li a{
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.nav-links li a:hover{
    color:#ff1d52;
}

</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">
      <img src="images3/a24.png">
    </div>

    <ul class="nav-links">

        <li><a href="#">Home</a></li>

        <li><a href="#">Courses</a></li>

        <li><a href="#">About</a></li>

        <li><a href="#">Contact</a></li>

    </ul>

</nav>


</body>
</head>

<body>

<div class="banner">

    <video autoplay muted loop>
        <source src="images3/a25.mp4" type="video/mp4">
    </video>

</html>
